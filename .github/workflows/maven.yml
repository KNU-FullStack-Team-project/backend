name: backend CI

on:
  push:
    branches: [ "master" ]
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Create secrets.properties
      run: |
        mkdir -p src/main/resources

        echo "kis.api.app-key=${{ secrets.KIS_API_KEY }}" > src/main/resources/secrets.properties
        echo "kis.api.app-secret=${{ secrets.KIS_API_SECRET }}" >> src/main/resources/secrets.properties
        echo "spring.data.redis.password=${{ secrets.REDIS_PASSWORD }}" >> src/main/resources/secrets.properties
        echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> src/main/resources/secrets.properties
        echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> src/main/resources/secrets.properties
        echo "recaptcha.secret=${{ secrets.RECAPTCHA_SECRET }}" >> src/main/resources/secrets.properties
        echo "google.oauth.client-id=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" >> src/main/resources/secrets.properties
        
    # - name: Verify secrets.properties creation
    #   run: |
    #     echo ">>> Project Root Directory:"
    #     ls -F
    #     echo ">>> Resources Directory Structure:"
    #     ls -R src/main/resources
    #     echo ">>> Checking if secrets.properties exists:"
    #     if [ -f src/main/resources/secrets.properties ]; then
    #       echo "SUCCESS: secrets.properties found."
    #     else
    #       echo "ERROR: secrets.properties NOT FOUND!"
    #       exit 1
    #     fi
        
    #     echo ">>> Current Directory:"
    #     pwd
    #     echo ">>> Resources Directory Listing:"
    #     ls -R src/main/resources
    - name: Build with Maven
      run: |
        mvn -B package -DskipTests --file pom.xml
        echo ">>> Target Directory Listing:"
        ls -R target
    - name: Transfer Artifacts to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        # 빌드된 JAR 파일과 Dockerfile을 전송합니다.
        source: "backend/target/*.jar,backend/Dockerfile"
        target: "~/teamproject"
        strip_components: 1 # backend/ 폴더 구조를 떼고 전송
    - name: Deploy on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~/teamproject
          # 기존 컨테이너가 있다면 삭제
          sudo docker rm -f my-backend || true
          # 전송받은 파일로 이미지 빌드 및 실행
          sudo docker build -t team-backend .
          sudo docker run -d -p 8081:8081 --name my-backend team-backend

