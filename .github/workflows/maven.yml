# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: backend CI

on:
  push:
    branches: [ "master" ]
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Create secrets.properties
      run: |
        mkdir -p src/main/resources

        echo "kis.api.app-key=${{ secrets.KIS_API_KEY }}" > src/main/resources/secrets.properties
        echo "kis.api.app-secret=${{ secrets.KIS_API_SECRET }}" >> src/main/resources/secrets.properties
        echo "spring.data.redis.password=${{ secrets.REDIS_PASSWORD }}" >> src/main/resources/secrets.properties
        echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> src/main/resources/secrets.properties
        echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> src/main/resources/secrets.properties
        echo "recaptcha.secret=${{ secrets.RECAPTCHA_SECRET }}" >> src/main/resources/secrets.properties
        echo "google.oauth.client-id=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" >> src/main/resources/secrets.properties
    - name: Build with Maven
      run: mvn -B package -DskipTests --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
#test