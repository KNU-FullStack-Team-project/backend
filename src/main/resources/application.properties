server.port=8081
spring.application.name=teamproject
# ==========================================
# 비밀 설정 파일 임포트 (API Key 등)
# ==========================================
spring.config.import=optional:classpath:secrets.properties

# ==========================================
# Redis 연결 설정
# ==========================================
spring.data.redis.host=3.27.60.21
spring.data.redis.port=6379

# ==========================================
# 한국투자증권 (KIS) API 설정
# ==========================================
# 가상계좌(모의투자)용 URL
kis.api.url=https://openapivts.koreainvestment.com:29443

# ==========================================
# Oracle DB 연결 설정
# ==========================================
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# 일반적인 오라클 XE 버전의 로컬 주소입니다. 
# (만약 포트가 1521이 아니거나 이름이 XE가 아니면 본인 환경에 맞게 수정!)
spring.datasource.url=jdbc:oracle:thin:@teacherdev09.kro.kr:8877:xe

# ⭐️ 여기에 본인이 생성한 오라클 
# 계정 아이디와 비밀번호를 적어주세요!
spring.datasource.username=team12
spring.datasource.password=12345

# ==========================================
# JPA (Hibernate) 편리한 설정
# ==========================================
# 콘솔에 JPA가 날리는 SQL 쿼리를 예쁘게 보여줍니다.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Entity 클래스를 만들면 오라클 DB에 자동으로 테이블을 생성해 줍니다! (실무에선 validate 추천)
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.dialect.oracle_version=11

# 백엔드 실행 .\mvnw.cmd spring-boot:run
# 프론트 실행 npm run dev

# Gmail SMTP 서버 주소 (구글 메일 서버로 보내겠다는 뜻)
spring.mail.host=smtp.gmail.com

# Gmail SMTP 포트 번호
# 587 = TLS 방식 (보안 연결)
spring.mail.port=587

# 메일 보낼 구글 계정 아이디
# 환경변수 MAIL_USERNAME 값을 가져옴
spring.mail.username=${MAIL_USERNAME}

# 메일 보낼 구글 계정 앱 비밀번호
# 환경변수 MAIL_PASSWORD 값을 가져옴
spring.mail.password=${MAIL_PASSWORD}

# SMTP 서버 인증 사용 (로그인 해야 메일 보낼 수 있음)
spring.mail.properties.mail.smtp.auth=true

# TLS 보안 연결 사용 (암호화 통신)
spring.mail.properties.mail.smtp.starttls.enable=true