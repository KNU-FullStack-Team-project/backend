server.port=8081
spring.application.name=teamproject
# ==========================================
# 비밀 설정 파일 임포트 (API Key 등)
# ==========================================
spring.config.import=optional:classpath:secrets.properties

# ==========================================
# Redis 연결 설정
# ==========================================
spring.data.redis.host=3.27.60.21
spring.data.redis.port=6379

# ==========================================
# 한국투자증권 (KIS) API 설정
# ==========================================
# 가상계좌(모의투자)용 URL
kis.api.url=https://openapivts.koreainvestment.com:29443

# ==========================================
# Oracle DB 연결 설정
# ==========================================
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# 일반적인 오라클 XE 버전의 로컬 주소입니다. 
# (만약 포트가 1521이 아니거나 이름이 XE가 아니면 본인 환경에 맞게 수정!)
spring.datasource.url=jdbc:oracle:thin:@teacherdev09.kro.kr:8877:xe

# ⭐️ 여기에 본인이 생성한 오라클 
# 계정 아이디와 비밀번호를 적어주세요!
spring.datasource.username=team12
spring.datasource.password=12345

# HikariCP 커넥션 풀 설정 (원격 DB 연결 안정화 및 고부하 대응)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.data-source-properties.oracle.jdbc.ReadTimeout=60000

# ==========================================
# JPA (Hibernate) 편리한 설정
# ==========================================
# 콘솔에 JPA가 날리는 SQL 쿼리를 예쁘게 보여줍니다.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Entity 클래스를 만들면 오라클 DB에 자동으로 테이블을 생성해 줍니다! (실무에선 validate 추천)
# spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.OracleLegacyDialect

# 백엔드 실행 .\mvnw.cmd spring-boot:run
# 프론트 실행 npm run dev

# Gmail SMTP 서버 주소 (구글 메일 서버로 보내겠다는 뜻)
spring.mail.host=smtp.gmail.com

# Gmail SMTP 포트 번호
# 587 = TLS 방식 (보안 연결)
spring.mail.port=587

# 메일 보낼 구글 계정 아이디
# 환경변수 MAIL_USERNAME 값을 가져옴
spring.mail.username=${MAIL_USERNAME}

# 메일 보낼 구글 계정 앱 비밀번호
# 환경변수 MAIL_PASSWORD 값을 가져옴
spring.mail.password=${MAIL_PASSWORD}

# SMTP 서버 인증 사용 (로그인 해야 메일 보낼 수 있음)
spring.mail.properties.mail.smtp.auth=true

# TLS 보안 연결 사용 (암호화 통신)
spring.mail.properties.mail.smtp.starttls.enable=true

#테스트
#kis.api.app-key=${KIS_APP_KEY}
#kis.api.app-secret=${KIS_APP_SECRET}
logging.level.org.team12.teamproject.service.StockService=WARN
# 시큐리티 보안 필터 로그가 너무 많아 보기 힘들면 INFO로 변경하세요. (상세 분석이 필요할 때만 TRACE 사용)
logging.level.org.springframework.security=INFO

# 💡 팁: 만약 상세 로그(TRACE)를 천천히 눈으로 확인하고 싶다면 아래 주석 처리를 지우세요. 
# 콘솔에 빠르게 지나가는 대신 프로젝트 폴더 내 logs/spring-debug.log 파일로 저장되어 천천히 읽을 수 있습니다.
# logging.file.name=logs/spring-debug.log

#시큐리티 충돌방지
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

#파일업로드
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=uploads

# Google OAuth (Google Identity Services)
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
